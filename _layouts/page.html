---
layout: default
---
<article class="page">
  <header class="page__header section">
    <div class="container container--narrow">
      <h1 class="page__title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page__subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </header>
  <div class="page__content section">
    <div class="container container--narrow">
      {{ content }}
    </div>
  </div>
</article>
