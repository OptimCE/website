{% assign lang = page.lang | default: site.lang %}
{% assign t = site.data.i18n[lang] %}
<div class="lang-switcher">
  <button class="lang-switcher__trigger" aria-label="{{ t.a11y.language_select }}">
    {{ lang | upcase }}
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 5l3 3 3-3"/></svg>
  </button>
  <ul class="lang-switcher__list">
    {% for l in site.languages %}
      <li>
        <a href="{{ l.prefix | append: '/' | relative_url }}"{% if lang == l.code %} aria-current="true"{% endif %}>
          {{ t.languages[l.code] }}
        </a>
      </li>
    {% endfor %}
  </ul>
</div>
