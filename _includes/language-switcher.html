{% assign t = site.data.i18n[site.lang] %}
<div class="lang-switcher">
  <button class="lang-switcher__trigger" aria-label="{{ t.a11y.language_select }}">
    {{ site.lang | upcase }}
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 5l3 3 3-3"/></svg>
  </button>
  <ul class="lang-switcher__list">
    <li><a href="{{ '/' | relative_url }}" aria-current="true">{{ t.languages.fr }}</a></li>
    <li><a href="#" class="disabled" title="Bientôt disponible">{{ t.languages.en }}</a></li>
    <li><a href="#" class="disabled" title="Bientôt disponible">{{ t.languages.nl }}</a></li>
    <li><a href="#" class="disabled" title="Bientôt disponible">{{ t.languages.de }}</a></li>
  </ul>
</div>
