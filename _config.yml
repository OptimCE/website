# Site Settings
title: "OptimCE"
email: "contact@optimce.org"
description: >-
  OptimCE est une plateforme open source de gestion pour les communautés
  d'énergie et les communautés d'énergie renouvelable. Gestion des membres,
  compteurs, clés de répartition et opérations de partage.
baseurl: "/"
url: "https://optimce.be"
lang: "fr"

# Supported languages
languages:
  - code: fr
    prefix: ""
    blog_path: "/actualites/"
    about_path: "/a-propos/"
    features_anchor: "#fonctionnalites"
  - code: en
    prefix: "/en"
    blog_path: "/en/news/"
    about_path: "/en/about/"
    features_anchor: "#features"
  - code: de
    prefix: "/de"
    blog_path: "/de/aktuelles/"
    about_path: "/de/about/"
    features_anchor: "#funktionen"
  - code: nl
    prefix: "/nl"
    blog_path: "/nl/nieuws/"
    about_path: "/nl/about/"
    features_anchor: "#functies"

# Author
author:
  name: "Équipe OptimCE"

# Social / Repository
github_username: "optimce"
repository: "optimce/website"

# Build Settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Permalink structure for posts
permalink: /actualites/:year/:month/:day/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "fr"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      lang: "fr"

# Sass
sass:
  sass_dir: _sass
  style: compressed
  silence_deprecations:
    - import

# Exclude from processing
exclude:
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
