# About
about:
  title: "About OptimCE"
  subtitle: "Our mission and our vision"
  mission_title: "Our mission"
  mission_text: >-
    OptimCE is an open source platform designed to simplify the management
    of energy communities and renewable energy communities.
    Our goal is to provide an accessible, transparent and efficient tool
    that enables communities to effectively manage their members, meters
    and energy sharing operations.
  why_title: "Why OptimCE?"
  why_text: >-
    Energy communities play a growing role in the European energy transition.
    Yet the available management tools are often proprietary, expensive or
    unsuited to the specific needs of these structures.
    OptimCE addresses this need by offering a free and open solution,
    designed specifically for the European regulatory context.
  architecture_title: "Technical architecture"
  architecture_intro: "OptimCE is built on a modern, modular architecture:"
  architecture_items:
    - label: "Frontend"
      text: "Angular, for a responsive and multilingual user interface (FR, EN, NL, DE)"
    - label: "Main backend"
      text: "Node.js with TypeScript, handling member, meter and allocation key management"
    - label: "Analytics backend"
      text: "FastAPI (Python), for data processing and optimisation"
    - label: "Event-driven architecture"
      text: "integration via SQS to connect external modules (e.g. energy management system)"
    - label: "Multi-tenant"
      text: "a single instance can serve multiple energy communities"
  contribute_title: "Contribute"
  contribute_text: >-
    OptimCE is an open source project and contributions are welcome.
    Whether you are a developer, designer, translator or simply passionate
    about energy communities, you can contribute in many ways.
  contribute_cta: "View the project on GitHub"

