# Features Section
features:
  title: "Features"
  subtitle: "Everything you need to manage your energy community"
  items:
    - icon: "users"
      title: "Member management"
      description: >-
        Onboarding, roles, community-user links.
        Easily manage all participants in your community.
    - icon: "meter"
      title: "Meter management"
      description: >-
        Track each member's energy meters
        and centralise consumption and production data.
    - icon: "key"
      title: "Allocation keys"
      description: >-
        Configure allocation keys and sharing operations
        to distribute energy among members.
    - icon: "building"
      title: "Multi-community"
      description: >-
        A single instance for multiple energy communities.
        Built-in multi-tenant architecture.
    - icon: "puzzle"
      title: "Extensible modules"
      description: >-
        Event-driven integration (SQS) allowing you to connect
        third-party tools such as an energy management system.
    - icon: "open-source"
      title: "Open source"
      description: >-
        Open and transparent source code. Contribute, audit
        and adapt the platform to your needs.

# Why OptimCE
why:
  title: "Why OptimCE?"
  subtitle: "A solution designed for European energy communities"
  points:
    - title: "Open source and transparent"
      description: >-
        Open, auditable and modifiable source code.
        No vendor lock-in.
    - title: "Designed for the European framework"
      description: >-
        Compliant with European directives on renewable energy
        communities and citizen energy communities.
    - title: "Easy to deploy"
      description: >-
        Quick installation. Multilingual interface (FR, EN, NL, DE)
        and scalable architecture.

