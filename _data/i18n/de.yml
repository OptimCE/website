# Features Section
features:
  title: "Funktionen"
  subtitle: "Alles, was Sie zur Verwaltung Ihrer Energiegemeinschaft brauchen"
  items:
    - icon: "users"
      title: "Mitgliederverwaltung"
      description: >-
        Onboarding, Rollen, Gemeinschaft-Nutzer-Verknüpfungen.
        Verwalten Sie alle Teilnehmer Ihrer Gemeinschaft einfach.
    - icon: "meter"
      title: "Zählerverwaltung"
      description: >-
        Verfolgen Sie die Energiezähler jedes Mitglieds
        und zentralisieren Sie Verbrauchs- und Produktionsdaten.
    - icon: "key"
      title: "Verteilungsschlüssel"
      description: >-
        Konfigurieren Sie Verteilungsschlüssel und Sharing-Operationen,
        um Energie unter den Mitgliedern zu verteilen.
    - icon: "building"
      title: "Multi-Gemeinschaft"
      description: >-
        Eine einzige Instanz für mehrere Energiegemeinschaften.
        Integrierte Multi-Tenant-Architektur.
    - icon: "puzzle"
      title: "Erweiterbare Module"
      description: >-
        Ereignisgesteuerte Integration (SQS) zum Anschluss von
        Drittanbieter-Tools wie einem Energiemanagementsystem.
    - icon: "open-source"
      title: "Open Source"
      description: >-
        Offener und transparenter Quellcode. Tragen Sie bei, prüfen Sie
        und passen Sie die Plattform an Ihre Bedürfnisse an.

# Why OptimCE
why:
  title: "Warum OptimCE?"
  subtitle: "Eine Lösung für europäische Energiegemeinschaften"
  points:
    - title: "Open Source und transparent"
      description: >-
        Offener, überprüfbarer und anpassbarer Quellcode.
        Kein Vendor-Lock-in.
    - title: "Für den europäischen Rahmen konzipiert"
      description: >-
        Konform mit den europäischen Richtlinien zu Erneuerbare-Energien-Gemeinschaften
        und Bürgerenergiegemeinschaften.
    - title: "Einfach bereitzustellen"
      description: >-
        Schnelle Installation. Mehrsprachige Oberfläche (FR, EN, NL, DE)
        und skalierbare Architektur.

