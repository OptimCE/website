# About
about:
  title: "Über OptimCE"
  subtitle: "Unsere Mission und unsere Vision"
  mission_title: "Unsere Mission"
  mission_text: >-
    OptimCE ist eine Open-Source-Plattform zur Vereinfachung der Verwaltung
    von Energiegemeinschaften und Erneuerbare-Energien-Gemeinschaften.
    Unser Ziel ist es, ein zugängliches, transparentes und leistungsfähiges Werkzeug
    bereitzustellen, mit dem Gemeinschaften ihre Mitglieder, Zähler
    und Energieverteilungsoperationen effizient verwalten können.
  why_title: "Warum OptimCE?"
  why_text: >-
    Energiegemeinschaften spielen eine wachsende Rolle bei der europäischen
    Energiewende. Dennoch sind die verfügbaren Verwaltungstools oft proprietär,
    teuer oder nicht an die Besonderheiten dieser Strukturen angepasst.
    OptimCE beantwortet diesen Bedarf mit einer freien und kostenlosen Lösung,
    die speziell für den europäischen Rechtsrahmen konzipiert wurde.
  architecture_title: "Technische Architektur"
  architecture_intro: "OptimCE basiert auf einer modernen, modularen Architektur:"
  architecture_items:
    - label: "Frontend"
      text: "Angular, für eine reaktionsschnelle und mehrsprachige Benutzeroberfläche (FR, EN, NL, DE)"
    - label: "Haupt-Backend"
      text: "Node.js mit TypeScript, für die Verwaltung von Mitgliedern, Zählern und Verteilungsschlüsseln"
    - label: "Analytik-Backend"
      text: "FastAPI (Python), für Datenverarbeitung und Optimierung"
    - label: "Ereignisgesteuerte Architektur"
      text: "Integration über SQS zum Anschluss externer Module (z.B. Energiemanagementsystem)"
    - label: "Multi-Tenant"
      text: "eine einzige Instanz kann mehrere Energiegemeinschaften bedienen"
  contribute_title: "Beitragen"
  contribute_text: >-
    OptimCE ist ein Open-Source-Projekt und Beiträge sind willkommen.
    Ob Entwickler, Designer, Übersetzer oder einfach begeistert
    von Energiegemeinschaften — Sie können auf vielfältige Weise beitragen.
  contribute_cta: "Projekt auf GitHub ansehen"

