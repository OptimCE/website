# Hero Section
hero:
  title: "La plateforme open source pour gérer votre communauté d'énergie"
  subtitle: >-
    OptimCE simplifie la gestion des membres, des compteurs et du partage
    d'énergie au sein de votre communauté d'énergie renouvelable.
  cta_primary: "Démarrer maintenant"
  cta_secondary: "Voir sur GitHub"

# Features Section
features:
  title: "Fonctionnalités"
  subtitle: "Tout ce dont vous avez besoin pour piloter votre communauté d'énergie"
  items:
    - icon: "users"
      title: "Gestion des membres"
      description: >-
        Onboarding, rôles, liens communauté-utilisateur.
        Gérez facilement tous les participants de votre communauté.
    - icon: "meter"
      title: "Gestion des compteurs"
      description: >-
        Suivez les compteurs d'énergie de chaque membre
        et centralisez les données de consommation et de production.
    - icon: "key"
      title: "Clés de répartition"
      description: >-
        Configurez les clés d'allocation et les opérations de partage
        pour distribuer l'énergie entre les membres.
    - icon: "building"
      title: "Multi-communautés"
      description: >-
        Une seule instance pour plusieurs communautés d'énergie.
        Architecture multi-tenant intégrée.
    - icon: "puzzle"
      title: "Modules extensibles"
      description: >-
        Intégration événementielle (SQS) permettant de brancher
        des outils tiers comme un système de gestion d'énergie.
    - icon: "open-source"
      title: "Open source"
      description: >-
        Code source ouvert et transparent. Contribuez, auditez
        et adaptez la plateforme à vos besoins.

# Why OptimCE
why:
  title: "Pourquoi OptimCE ?"
  subtitle: "Une solution pensée pour les communautés d'énergie européennes"
  points:
    - title: "Open source et transparent"
      description: >-
        Code source ouvert, auditable et modifiable.
        Aucun verrouillage fournisseur.
    - title: "Conçu pour le cadre européen"
      description: >-
        Conforme aux directives européennes sur les communautés
        d'énergie renouvelable et les communautés énergétiques citoyennes.
    - title: "Simple à déployer"
      description: >-
        Installation rapide. Interface multilingue (FR, EN, NL, DE)
        et architecture prête pour la montée en charge.

# For Developers
developers:
  title: "Pour les développeurs"
  subtitle: "Construit avec des technologies modernes et ouvertes"
  description: >-
    Frontend Angular, backend Node.js/TypeScript et FastAPI,
    architecture événementielle. Contribuez sur GitHub ou intégrez
    OptimCE dans vos propres outils via l'API REST.
  tech_stack: "Angular · Node.js · TypeScript · FastAPI · PostgreSQL"
  cta: "Contribuer sur GitHub"

