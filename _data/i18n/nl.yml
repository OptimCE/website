# About
about:
  title: "Over OptimCE"
  subtitle: "Onze missie en onze visie"
  mission_title: "Onze missie"
  mission_text: >-
    OptimCE is een open source platform ontworpen om het beheer van
    energiegemeenschappen en hernieuwbare-energiegemeenschappen te vereenvoudigen.
    Ons doel is een toegankelijk, transparant en performant hulpmiddel te bieden
    waarmee gemeenschappen hun leden, meters
    en energiedelingsoperaties efficiënt kunnen beheren.
  why_title: "Waarom OptimCE?"
  why_text: >-
    Energiegemeenschappen spelen een groeiende rol in de Europese energietransitie.
    Toch zijn de beschikbare beheertools vaak propriëtair, duur of niet aangepast
    aan de specifieke behoeften van deze structuren.
    OptimCE beantwoordt deze behoefte met een vrije en gratis oplossing,
    specifiek ontworpen voor de Europese regelgevingscontext.
  architecture_title: "Technische architectuur"
  architecture_intro: "OptimCE is gebouwd op een moderne, modulaire architectuur:"
  architecture_items:
    - label: "Frontend"
      text: "Angular, voor een responsieve en meertalige gebruikersinterface (FR, EN, NL, DE)"
    - label: "Hoofd-backend"
      text: "Node.js met TypeScript, voor het beheer van leden, meters en verdeelsleutels"
    - label: "Analytische backend"
      text: "FastAPI (Python), voor gegevensverwerking en optimalisatie"
    - label: "Gebeurtenisgestuurde architectuur"
      text: "integratie via SQS om externe modules aan te sluiten (bijv. energiebeheersysteem)"
    - label: "Multi-tenant"
      text: "één instantie kan meerdere energiegemeenschappen bedienen"
  contribute_title: "Bijdragen"
  contribute_text: >-
    OptimCE is een open source project en bijdragen zijn welkom.
    Of u nu ontwikkelaar, designer, vertaler bent of gewoon gepassioneerd
    door energiegemeenschappen, u kunt op vele manieren bijdragen.
  contribute_cta: "Bekijk het project op GitHub"

