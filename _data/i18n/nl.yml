# Features Section
features:
  title: "Functies"
  subtitle: "Alles wat u nodig heeft om uw energiegemeenschap te beheren"
  items:
    - icon: "users"
      title: "Ledenbeheer"
      description: >-
        Onboarding, rollen, gemeenschap-gebruiker koppelingen.
        Beheer eenvoudig alle deelnemers van uw gemeenschap.
    - icon: "meter"
      title: "Meterbeheer"
      description: >-
        Volg de energiemeters van elk lid
        en centraliseer verbruiks- en productiegegevens.
    - icon: "key"
      title: "Verdeelsleutels"
      description: >-
        Configureer verdeelsleutels en deeloperaties
        om energie onder de leden te verdelen.
    - icon: "building"
      title: "Multi-gemeenschap"
      description: >-
        Eén instantie voor meerdere energiegemeenschappen.
        Ingebouwde multi-tenant architectuur.
    - icon: "puzzle"
      title: "Uitbreidbare modules"
      description: >-
        Gebeurtenisgestuurde integratie (SQS) waarmee u
        tools van derden kunt aansluiten, zoals een energiebeheersysteem.
    - icon: "open-source"
      title: "Open source"
      description: >-
        Open en transparante broncode. Draag bij, controleer
        en pas het platform aan uw behoeften aan.

# Why OptimCE
why:
  title: "Waarom OptimCE?"
  subtitle: "Een oplossing ontworpen voor Europese energiegemeenschappen"
  points:
    - title: "Open source en transparant"
      description: >-
        Open, controleerbare en aanpasbare broncode.
        Geen vendor lock-in.
    - title: "Ontworpen voor het Europese kader"
      description: >-
        In overeenstemming met de Europese richtlijnen voor hernieuwbare-energiegemeenschappen
        en burgerenergiegemeenschappen.
    - title: "Eenvoudig te implementeren"
      description: >-
        Snelle installatie. Meertalige interface (FR, EN, NL, DE)
        en schaalbare architectuur.

# For Developers
developers:
  title: "Voor ontwikkelaars"
  subtitle: "Gebouwd met moderne, open technologieën"
  description: >-
    Angular frontend, Node.js/TypeScript en FastAPI backend,
    gebeurtenisgestuurde architectuur. Draag bij op GitHub of integreer
    OptimCE in uw eigen tools via de REST API.
  tech_stack: "Angular · Node.js · TypeScript · FastAPI · PostgreSQL"
  cta: "Bijdragen op GitHub"

